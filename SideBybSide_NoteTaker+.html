<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<style>
  :root {
    --bg:#f9f9f7;--surface:#fff;--surface2:#f5f5f2;--border:#e0e0d8;
    --text:#1a1a1a;--text2:#555;--text3:#999;
    --sidebar-bg:#2e2e2e;--sidebar-text:#ccc;--sidebar-active:#3a3a3a;
    --thead-bg:#3a3a3a;
    --row-odd-bg:#eef3fb;--row-odd-border:#3a6bc4;--row-odd-note-bg:#d9e6f7;--row-odd-note-text:#3a6bc4;
    --row-even-bg:#fdf6e3;--row-even-border:#c4a43a;--row-even-note-bg:#f0e2b8;--row-even-note-text:#8a5e00;
    --sum-col-bg:#f9f9f7;--sum-note-bg:#f0f0ec;--sum-note-border:#ccc;
    --cs-item-bg:#f7f7f4;--ref-bg:#fff;--ref-tabs-bg:#f5f5f2;
    --toggle-bg:#e0e0d8;--toggle-knob:#fff;
  }
  [data-theme="dark"] {
    --bg:#18181b;--surface:#27272a;--surface2:#1f1f22;--border:#3f3f46;
    --text:#f4f4f5;--text2:#a1a1aa;--text3:#71717a;
    --sidebar-bg:#111113;--sidebar-text:#a1a1aa;--sidebar-active:#27272a;
    --thead-bg:#111113;
    --row-odd-bg:#1e2535;--row-odd-border:#4a7bd4;--row-odd-note-bg:#1a2840;--row-odd-note-text:#7aaaf0;
    --row-even-bg:#272214;--row-even-border:#c4a43a;--row-even-note-bg:#2e2510;--row-even-note-text:#d4a850;
    --sum-col-bg:#27272a;--sum-note-bg:#323236;--sum-note-border:#52525b;
    --cs-item-bg:#323236;--ref-bg:#27272a;--ref-tabs-bg:#1f1f22;
    --toggle-bg:#4a7bd4;--toggle-knob:#fff;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;transition:background .2s,color .2s;}

  /* Topbar */
  .topbar{position:fixed;top:0;left:0;right:0;height:44px;background:var(--thead-bg);z-index:300;display:flex;align-items:center;justify-content:flex-end;padding:0 16px;gap:10px;}
  .topbar-label{font-size:12px;color:#aaa;}
  .theme-toggle{display:flex;align-items:center;gap:7px;background:none;border:none;cursor:pointer;padding:0;}
  .toggle-track{width:36px;height:20px;border-radius:10px;background:var(--toggle-bg);position:relative;transition:background .2s;flex-shrink:0;}
  .toggle-knob{width:14px;height:14px;border-radius:50%;background:var(--toggle-knob);position:absolute;top:3px;left:3px;transition:transform .2s;}
  [data-theme="dark"] .toggle-knob{transform:translateX(16px);}
  .toggle-icon{font-size:14px;}

  /* Sidebar */
  .sidebar{width:160px;flex-shrink:0;background:var(--sidebar-bg);display:flex;flex-direction:column;position:sticky;top:44px;height:calc(100vh - 44px);overflow:hidden;transition:width .22s ease;}
  .sidebar.collapsed{width:40px;}
  .sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:14px 10px 10px 16px;flex-shrink:0;min-height:44px;}
  .sidebar-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#888;white-space:nowrap;overflow:hidden;transition:opacity .15s;}
  .sidebar.collapsed .sidebar-title{opacity:0;pointer-events:none;}
  .sidebar-toggle{background:none;border:none;color:#888;cursor:pointer;font-size:16px;line-height:1;padding:2px 4px;flex-shrink:0;}
  .sidebar-toggle:hover{color:#fff;}
  .sidebar-nav{display:flex;flex-direction:column;gap:2px;padding:4px 0;overflow-y:auto;flex:1;}
  .sidebar-btn{background:none;border:none;color:var(--sidebar-text);font-family:inherit;font-size:12px;font-weight:500;text-align:left;padding:10px 16px;cursor:pointer;border-left:3px solid transparent;transition:background .15s;line-height:1.4;white-space:nowrap;overflow:hidden;display:flex;align-items:center;gap:8px;}
  .sidebar-btn:hover{background:#3a3a3a;color:#fff;}
  .sidebar-btn.active{background:var(--sidebar-active);color:#fff;border-left-color:#5b8dee;}
  .sidebar-btn .btn-icon{flex-shrink:0;font-size:14px;}
  .sidebar-btn .btn-label{overflow:hidden;transition:opacity .15s;white-space:nowrap;}
  .sidebar.collapsed .sidebar-btn .btn-label{opacity:0;pointer-events:none;}
  .sidebar.collapsed .sidebar-btn{justify-content:center;padding:10px 0;border-left:none;}

  /* Calculator */
  .calc-wrap{padding:8px;margin-top:auto;border-top:1px solid #3a3a3a;flex-shrink:0;}
  .calc-display{background:#111;color:#fff;border-radius:6px;padding:6px 8px;text-align:right;margin-bottom:6px;overflow:hidden;}
  .calc-expr{font-size:10px;color:#888;min-height:14px;word-break:break-all;}
  .calc-result{font-size:18px;font-weight:700;min-height:24px;word-break:break-all;}
  .calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
  .calc-btn{background:#3a3a3a;color:#eee;border:none;border-radius:5px;padding:7px 2px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center;transition:background .1s;}
  .calc-btn:hover{background:#505050;}
  .calc-btn.op{background:#5b4a1e;color:#f4c430;}
  .calc-btn.op:hover{background:#7a6428;}
  .calc-btn.eq{background:#1e4a5b;color:#5bbdf4;}
  .calc-btn.eq:hover{background:#28607a;}
  .calc-btn.clr{background:#4a1e1e;color:#f45b5b;}
  .calc-btn.clr:hover{background:#6a2828;}
  .sidebar.collapsed .calc-wrap{display:none;}

  /* Main */
  .main{flex:1;padding:24px;padding-top:68px;min-width:0;}
  h1{font-size:18px;font-weight:600;margin-bottom:16px;}

  /* Table */
  table{width:100%;border-collapse:separate;border-spacing:0 6px;}
  thead{background:var(--thead-bg);}
  th{font-size:13px;font-weight:600;padding:10px 12px;text-align:left;color:#eee;}
  th:first-child{border-radius:8px 0 0 8px;}
  th:last-child{border-radius:0 8px 8px 0;}
  th.center{text-align:center;}
  td{padding:8px 12px;vertical-align:top;}
  tbody tr:nth-child(odd)  td{background:var(--row-odd-bg);border-top:2px solid var(--row-odd-border);border-bottom:2px solid var(--row-odd-border);}
  tbody tr:nth-child(even) td{background:var(--row-even-bg);border-top:2px solid var(--row-even-border);border-bottom:2px solid var(--row-even-border);}
  tbody tr:nth-child(odd)  td:first-child{border-left:3px solid var(--row-odd-border);border-radius:4px 0 0 4px;}
  tbody tr:nth-child(even) td:first-child{border-left:3px solid var(--row-even-border);border-radius:4px 0 0 4px;}
  tbody tr:nth-child(odd)  td:last-child{border-right:3px solid var(--row-odd-border);border-radius:0 4px 4px 0;}
  tbody tr:nth-child(even) td:last-child{border-right:3px solid var(--row-even-border);border-radius:0 4px 4px 0;}

  .notes-input{width:100%;border:1.5px solid #c0c8d8;background:var(--surface);border-radius:6px;font-size:14px;color:var(--text);padding:6px 8px;outline:none;font-weight:500;resize:none;font-family:inherit;line-height:1.5;overflow:hidden;transition:border-color .15s,box-shadow .15s;}
  tbody tr:nth-child(odd)  .notes-input{border-color:var(--row-odd-border);}
  tbody tr:nth-child(even) .notes-input{border-color:var(--row-even-border);}
  .notes-input:focus{border-color:#3a6bc4;box-shadow:0 0 0 2px rgba(58,107,196,.18);}
  .notes-input::placeholder{color:var(--text3);font-weight:400;}

  .cb-group{display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;padding-top:4px;}
  .cb-group label{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text2);cursor:pointer;}
  .cb-group input[type=radio]{width:14px;height:14px;cursor:pointer;}
  tbody tr:nth-child(odd)  .cb-group input[type=radio]{accent-color:#3a6bc4;}
  tbody tr:nth-child(even) .cb-group input[type=radio]{accent-color:#b07d1a;}

  .sub-notes{margin-top:8px;}
  .sub-note-wrap{border-radius:6px;padding:5px 8px;}
  tbody tr:nth-child(odd)  .sub-note-wrap{background:var(--row-odd-note-bg);}
  tbody tr:nth-child(even) .sub-note-wrap{background:var(--row-even-note-bg);}
  .sub-note-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
  tbody tr:nth-child(odd)  .sub-note-label{color:var(--row-odd-note-text);}
  tbody tr:nth-child(even) .sub-note-label{color:var(--row-even-note-text);}
  .sub-note-input{width:100%;border:none;background:transparent;font-size:12px;color:var(--text);outline:none;resize:none;min-height:36px;font-family:inherit;line-height:1.4;}
  .sub-note-input::placeholder{color:var(--text3);}

  /* Save note buttons */
  .note-actions{display:flex;gap:5px;margin-top:5px;}
  .note-save-btn{font-size:10px;font-weight:700;border:none;border-radius:4px;padding:4px 8px;cursor:pointer;font-family:inherit;transition:opacity .15s;}
  .note-save-btn:hover{opacity:.8;}
  .btn-general{background:#3a6bc4;color:#fff;}
  .btn-ai{background:#2a7a4f;color:#fff;}

  .add-btn{margin-top:4px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:13px;color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  .add-btn:hover{background:var(--surface2);}

  /* Color section */
  .color-section{margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .color-card{background:var(--surface);border-radius:10px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.1);}
  .color-card h3{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text);}
  .picker-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .pick-btn{display:flex;align-items:center;gap:6px;background:#3a3a3a;color:#fff;border:none;border-radius:7px;padding:7px 13px;font-size:12px;cursor:pointer;font-family:inherit;}
  .pick-btn:hover{background:#555;}
  .pick-btn:disabled{background:#aaa;cursor:not-allowed;}
  .color-preview{width:28px;height:28px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);flex-shrink:0;}
  .hex-val{font-size:12px;color:var(--text2);font-family:monospace;}
  .color-list{display:flex;flex-direction:column;gap:6px;}
  .color-tag{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);flex-wrap:wrap;}
  .color-swatch{width:20px;height:20px;border-radius:4px;border:1px solid rgba(0,0,0,.1);flex-shrink:0;}
  .color-name-fancy{font-weight:600;}
  .color-name-simple{color:var(--text2);font-size:12px;font-weight:700;}
  .fallback-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .fallback-input{border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:13px;width:100px;font-family:monospace;background:var(--surface);color:var(--text);}
  .fallback-add{background:#3a3a3a;color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer;font-family:inherit;}

  /* Summary */
  .summary{margin-top:20px;display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .sum-card{background:var(--surface);border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
  .sum-card h2{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text);}
  .sum-cols{display:flex;flex-direction:column;gap:10px;}
  .sum-col{background:var(--sum-col-bg);border-radius:8px;padding:10px;}
  .sum-section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid;}
  .has-label{color:#2a7a4f;border-color:#2a7a4f;}
  .partial-label{color:#a06b00;border-color:#a06b00;}
  .not-label{color:#b03a2e;border-color:#b03a2e;}
  .sum-item{font-size:12px;padding:5px 0;border-bottom:1px solid var(--border);}
  .sum-item:last-child{border-bottom:none;}
  .sum-item-title{display:flex;align-items:flex-start;gap:5px;font-weight:500;color:var(--text);word-break:break-word;}
  .sum-item-subnote{font-size:11px;color:var(--text2);padding:4px 8px;margin-top:5px;margin-left:16px;word-break:break-word;background:var(--sum-note-bg);border-left:2px solid var(--sum-note-border);border-radius:0 4px 4px 0;line-height:1.4;}
  .dot-yes{color:#2a7a4f;flex-shrink:0;}
  .dot-no{color:#b03a2e;flex-shrink:0;}
  .dot-partial{color:#a06b00;flex-shrink:0;}
  .empty{font-size:12px;color:var(--text3);font-style:italic;}

  /* AI Notes section in summary */
  .ai-notes-section{margin-top:14px;border-top:2px solid var(--border);padding-top:10px;}
  .ai-notes-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#2a7a4f;margin-bottom:8px;}
  .ai-note-entry{background:var(--sum-note-bg);border-left:3px solid #2a7a4f;border-radius:0 6px 6px 0;padding:8px 10px;margin-bottom:8px;}
  .ai-note-entry:last-child{margin-bottom:0;}
  .ai-note-request{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px;}
  .ai-note-text{font-size:12px;color:var(--text);line-height:1.5;}

  .reset-btn{margin-top:20px;background:var(--surface);border:1px solid #e0b0aa;border-radius:8px;padding:8px 20px;font-size:13px;color:#b03a2e;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  .reset-btn:hover{background:#fdf0ef;}

  /* Reference panel */
  .ref-panel{display:none;position:fixed;top:44px;right:0;width:520px;max-width:95vw;height:calc(100vh - 44px);background:var(--ref-bg);box-shadow:-4px 0 24px rgba(0,0,0,.2);z-index:200;flex-direction:column;}
  .ref-panel.open{display:flex;}
  .ref-header{background:#2e2e2e;color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .ref-header h2{font-size:14px;font-weight:700;}
  .ref-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;}
  .ref-inner{display:flex;flex:1;overflow:hidden;}
  .ref-tabs{display:flex;flex-direction:column;width:140px;flex-shrink:0;background:var(--ref-tabs-bg);border-right:1px solid var(--border);overflow-y:auto;padding:8px 0;gap:2px;}
  .ref-tab{padding:9px 14px;font-size:12px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--text2);border-left:3px solid transparent;text-align:left;font-family:inherit;line-height:1.4;}
  .ref-tab.active{color:var(--text);border-left:3px solid #3a6bc4;background:var(--ref-bg);}
  .ref-tab:hover:not(.active){background:var(--surface2);color:var(--text);}
  .ref-body{padding:16px 18px;overflow-y:auto;flex:1;}
  .ref-panel-content{display:none;}
  .ref-panel-content.active{display:block;}
  .cs-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .cs-item{background:var(--cs-item-bg);border-radius:8px;padding:10px 12px;border-left:3px solid #3a6bc4;}
  .cs-item-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px;}
  .cs-item-example{font-size:11px;color:var(--text2);font-style:italic;line-height:1.4;}

  /* User Guide */
  .guide-section{margin-bottom:20px;}
  .guide-section h3{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid #3a6bc4;}
  .guide-step{display:flex;gap:10px;margin-bottom:8px;font-size:12px;line-height:1.5;color:var(--text2);}
  .guide-num{width:20px;height:20px;background:#3a6bc4;color:#fff;border-radius:50%;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
  .guide-tip{background:var(--cs-item-bg);border-left:3px solid #a06b00;border-radius:0 6px 6px 0;padding:8px 10px;font-size:12px;color:var(--text2);line-height:1.5;margin-top:8px;}

  .overlay-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:199;}
  .overlay-bg.open{display:block;}
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-label" id="themeLabel">Light Mode</span>
  <button class="theme-toggle" onclick="toggleTheme()">
    <span class="toggle-icon">☀️</span>
    <div class="toggle-track"><div class="toggle-knob"></div></div>
    <span class="toggle-icon">🌙</span>
  </button>
</div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-title">Reference</span>
    <button class="sidebar-toggle" onclick="toggleSidebar()">◀</button>
  </div>
  <nav class="sidebar-nav">
    <button class="sidebar-btn" id="sideBtn-visuals"      onclick="openPanel('visuals')"><span class="btn-icon">📋</span><span class="btn-label">Visual Quality</span></button>
    <button class="sidebar-btn" id="sideBtn-if"           onclick="openPanel('if')"><span class="btn-icon">✅</span><span class="btn-label">Instruction Following</span></button>
    <button class="sidebar-btn" id="sideBtn-correctness"  onclick="openPanel('correctness')"><span class="btn-icon">🔍</span><span class="btn-label">Correctness</span></button>
    <button class="sidebar-btn" id="sideBtn-guide"        onclick="openPanel('guide')"><span class="btn-icon">📖</span><span class="btn-label">User Guide</span></button>
  </nav>
  <div class="calc-wrap">
    <div class="calc-display">
      <div class="calc-expr" id="calcExpr"></div>
      <div class="calc-result" id="calcResult">0</div>
    </div>
    <div class="calc-grid">
      <button class="calc-btn clr" onclick="calcClear()">C</button>
      <button class="calc-btn clr" onclick="calcDel()">⌫</button>
      <button class="calc-btn op"  onclick="calcInput('%')">%</button>
      <button class="calc-btn op"  onclick="calcInput('/')">÷</button>
      <button class="calc-btn"     onclick="calcInput('7')">7</button>
      <button class="calc-btn"     onclick="calcInput('8')">8</button>
      <button class="calc-btn"     onclick="calcInput('9')">9</button>
      <button class="calc-btn op"  onclick="calcInput('*')">×</button>
      <button class="calc-btn"     onclick="calcInput('4')">4</button>
      <button class="calc-btn"     onclick="calcInput('5')">5</button>
      <button class="calc-btn"     onclick="calcInput('6')">6</button>
      <button class="calc-btn op"  onclick="calcInput('-')">−</button>
      <button class="calc-btn"     onclick="calcInput('1')">1</button>
      <button class="calc-btn"     onclick="calcInput('2')">2</button>
      <button class="calc-btn"     onclick="calcInput('3')">3</button>
      <button class="calc-btn op"  onclick="calcInput('+')">+</button>
      <button class="calc-btn"     onclick="calcInput('+/-')">+/−</button>
      <button class="calc-btn"     onclick="calcInput('0')">0</button>
      <button class="calc-btn"     onclick="calcInput('.')">.</button>
      <button class="calc-btn eq"  onclick="calcEquals()">=</button>
    </div>
  </div>
</aside>

<div class="overlay-bg" id="overlayBg" onclick="closePanel()"></div>
<div class="ref-panel" id="refPanel">
  <div class="ref-header"><h2 id="refTitle"></h2><button class="ref-close" onclick="closePanel()">✕</button></div>
  <div class="ref-inner"><div class="ref-tabs" id="refTabs"></div><div class="ref-body" id="refBody"></div></div>
</div>

<main class="main">
  <h1>Image Comparison Sheet</h1>
  <table>
    <thead><tr><th style="width:40%">Request</th><th class="center" style="width:30%">Image A</th><th class="center" style="width:30%">Image B</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <button class="add-btn" onclick="addRow()">+ Add row</button>

  <div class="color-section">
    <div class="color-card">
      <h3>🎨 Image A — Color Picker</h3>
      <div id="aFallback" style="display:none;"><div class="fallback-row"><input class="fallback-input" id="aFallbackInput" type="text" placeholder="#rrggbb" maxlength="7"/><button class="fallback-add" onclick="addFallbackColor('a')">Add</button></div></div>
      <div class="picker-row"><button class="pick-btn" id="aPickBtn" onclick="pickColor('a')">🎨 Pick Color</button><div class="color-preview" id="aPreview"></div><span class="hex-val" id="aHex"></span></div>
      <div class="color-list" id="aColorList"></div>
    </div>
    <div class="color-card">
      <h3>🎨 Image B — Color Picker</h3>
      <div id="bFallback" style="display:none;"><div class="fallback-row"><input class="fallback-input" id="bFallbackInput" type="text" placeholder="#rrggbb" maxlength="7"/><button class="fallback-add" onclick="addFallbackColor('b')">Add</button></div></div>
      <div class="picker-row"><button class="pick-btn" id="bPickBtn" onclick="pickColor('b')">🎨 Pick Color</button><div class="color-preview" id="bPreview"></div><span class="hex-val" id="bHex"></span></div>
      <div class="color-list" id="bColorList"></div>
    </div>
  </div>

  <div class="summary">
    <div class="sum-card">
      <h2>Image A</h2>
      <div class="sum-cols">
        <div class="sum-col"><div class="sum-section-label not-label">✗ Does Not Have</div><div id="aNot"></div></div>
        <div class="sum-col"><div class="sum-section-label partial-label">◑ Partially Has</div><div id="aPartial"></div></div>
        <div class="sum-col"><div class="sum-section-label has-label">✓ Has</div><div id="aHas"></div></div>
      </div>
      <div class="ai-notes-section" id="aAiSection" style="display:none;">

var calcExpr='',calcJustEvaled=false;
function calcDisplay(){var ex=document.getElementById('calcExpr'),re=document.getElementById('calcResult');var d=calcExpr.replace(/\*/g,'×').replace(/\//g,'÷');ex.textContent=d;if(!calcExpr){re.textContent='0';return;}try{var v=Function('"use strict";return('+calcExpr+')')();re.textContent=isFinite(v)?parseFloat(v.toFixed(10)):'Error';}catch(e){re.textContent=d;}}
function calcInput(v){var ops=['+','-','*','/','%'];if(calcJustEvaled&&ops.indexOf(v)===-1)calcExpr='';calcJustEvaled=false;if(v==='+/-'){var m=calcExpr.match(/(.*[+\-*/]|^)([-]?\d*\.?\d+)$/);if(m)calcExpr=m[1]+(parseFloat(m[2])*-1).toString();calcDisplay();return;}if(v==='.'){var parts=calcExpr.split(/[+\-*/]/);if(parts[parts.length-1].indexOf('.')!==-1)return;if(parts[parts.length-1]==='')calcExpr+='0';}if(['+','-','*','/','%'].indexOf(v)!==-1){if(!calcExpr&&v!=='-')return;if(['+','-','*','/','%'].indexOf(calcExpr.slice(-1))!==-1)calcExpr=calcExpr.slice(0,-1);}calcExpr+=v;calcDisplay();}
function calcEquals(){if(!calcExpr)return;try{var v=Function('"use strict";return('+calcExpr+')')();if(isFinite(v)){document.getElementById('calcExpr').textContent=calcExpr.replace(/\*/g,'×').replace(/\//g,'÷')+' =';calcExpr=parseFloat(v.toFixed(10)).toString();document.getElementById('calcResult').textContent=calcExpr;calcJustEvaled=true;}else document.getElementById('calcResult').textContent='Error';}catch(e){document.getElementById('calcResult').textContent='Error';}}
function calcClear(){calcExpr='';calcJustEvaled=false;calcDisplay();}
function calcDel(){if(calcJustEvaled){calcClear();return;}calcExpr=calcExpr.slice(0,-1);calcDisplay();}

function openPanel(type){
  var tabsEl=document.getElementById('refTabs'),bodyEl=document.getElementById('refBody'),titleEl=document.getElementById('refTitle');

  document.querySelectorAll('.sidebar-btn').forEach(function(b){b.classList.remove('active');});

    titleEl.textContent='📋 Visual Quality Cheat Sheet';
    var cats=Object.keys(cheatSheet);
    cats.forEach(function(cat,i){
      var tab=document.createElement('button');tab.className='ref-tab'+(i===0?' active':'');tab.textContent=cat;tab.onclick=function(){switchRefTab(cat);};tabsEl.appendChild(tab);

      var grid=document.createElement('div');grid.className='cs-grid';
      cheatSheet[cat].forEach(function(item){var d=document.createElement('div');d.className='cs-item';d.innerHTML='<div class="cs-item-title">'+item.term+'</div><div class="cs-item-example">"'+item.ex+'"</div>';grid.appendChild(d);});
      panel.appendChild(grid);bodyEl.appendChild(panel);
    });
  } else if(type==='guide'){
    titleEl.textContent='📖 User Guide';
    guideData.forEach(function(sec,i){
      var tab=document.createElement('button');tab.className='ref-tab'+(i===0?' active':'');tab.textContent=sec.title;tab.onclick=(function(idx){return function(){switchRefTab('guide'+idx);};})(i);tabsEl.appendChild(tab);
      var panel=document.createElement('div');panel.className='ref-panel-content'+(i===0?' active':'');panel.dataset.cat='guide'+i;
      var html='<div class="guide-section"><h3>'+sec.title+'</h3>';
      sec.steps.forEach(function(s,si){html+='<div class="guide-step"><div class="guide-num">'+(si+1)+'</div><div>'+s+'</div></div>';});
      if(i===0)html+='<div class="guide-tip">Tip: You can add more rows at any time using the Add Row button below the table.</div>';
      html+='</div>';
      panel.innerHTML=html;bodyEl.appendChild(panel);
    });
  } else {
    var data=type==='if'?ifData:correctnessData;
    titleEl.textContent=type==='if'?'✅ Instruction Following':'🔍 Correctness';
    ['definition','examples'].forEach(function(label,i){
      var tab=document.createElement('button');tab.className='ref-tab'+(i===0?' active':'');tab.textContent=label.charAt(0).toUpperCase()+label.slice(1);tab.onclick=(function(l){return function(){switchRefTab(l);};})(label);tabsEl.appendChild(tab);
    });

    defPanel.innerHTML='<div style="background:var(--cs-item-bg);border-radius:10px;padding:16px;border-left:3px solid #3a6bc4;font-size:14px;line-height:1.6;color:var(--text);">'+data.definition+'</div>';

function switchRefTab(cat){
  document.querySelectorAll('.ref-tab').forEach(function(t){t.classList.toggle('active',t.textContent.toLowerCase()===cat||t.textContent===cat);});

function saveNote(rowId,img){
  var tr=document.getElementById('row'+rowId);
  var reqTA=tr.querySelector('textarea.notes-input');
  var tas=tr.querySelectorAll('textarea.sub-note-input');
  var noteTA=img==='a'?tas[0]:tas[1];
  var noteText=noteTA?noteTA.value.trim():'';
  if(!noteText)return;

  updateSummary();

function saveAiNote(rowId,img){
  var tr=document.getElementById('row'+rowId);
  var reqTA=tr.querySelector('textarea.notes-input');
  var tas=tr.querySelectorAll('textarea.sub-note-input');
  var noteTA=img==='a'?tas[0]:tas[1];
  var reqText=reqTA?reqTA.value.trim():'Row '+rowId;
  var noteText=noteTA?noteTA.value.trim():'';
  if(!noteText)return;
  aiNotes[img].push({request:reqText,note:noteText});
  renderAiNotes(img);
}

function renderAiNotes(img){
  var el=document.getElementById(img+'AiNotes');
  var sec=document.getElementById(img+'AiSection');
  if(!aiNotes[img].length){sec.style.display='none';el.innerHTML='';return;}
  sec.style.display='block';
  el.innerHTML=aiNotes[img].map(function(n){
    return '<div class="ai-note-entry">'
      +'<div class="ai-note-request">'+n.request+'</div>'
      +'<div class="ai-note-text">'+n.note+'</div>'
      +'</div>';
  }).join('');
}

function hexToRgb(hex){hex=hex.replace('#','');if(hex.length===3)hex=hex.split('').map(function(c){return c+c;}).join('');var n=parseInt(hex,16);return[(n>>16)&255,(n>>8)&255,n&255];}
function colorDist(a,b){return Math.sqrt(2*(a[0]-b[0])*(a[0]-b[0])+4*(a[1]-b[1])*(a[1]-b[1])+3*(a[2]-b[2])*(a[2]-b[2]));}
function hexToNames(hex){
  var rgb=hexToRgb(hex),bestD=Infinity,fancy='Unknown',simple='';
  colorDB.forEach(function(e){var d=colorDist(rgb,e[0]);if(d<bestD){bestD=d;fancy=e[1];simple=e[2];}});
  var confidence=Math.max(0,Math.round(100-(bestD/160)*100));
  var label=confidence>=90?'Exact':confidence>=70?'Close':confidence>=45?'Approx':'Estimated';
  var confColor=confidence>=90?'#2a7a4f':confidence>=70?'#a06b00':confidence>=45?'#b03a2e':'#7a2a6f';
  return{fancy:fancy,simple:simple,confidence:confidence,label:label,confColor:confColor};
}

var colorLists={a:[],b:[]};
var eyedropperSupported=typeof EyeDropper!=='undefined';
if(!eyedropperSupported){document.getElementById('aFallback').style.display='block';document.getElementById('bFallback').style.display='block';document.getElementById('aPickBtn').style.display='none';document.getElementById('bPickBtn').style.display='none';}
function pickColor(img){var btn=document.getElementById(img==='a'?'aPickBtn':'bPickBtn');btn.disabled=true;btn.textContent='⏳ Picking...';new EyeDropper().open().then(function(r){addColorEntry(img,r.sRGBHex.toLowerCase());btn.disabled=false;btn.textContent='🎨 Pick Color';}).catch(function(){btn.disabled=false;btn.textContent='🎨 Pick Color';});}
function addFallbackColor(img){var inp=document.getElementById(img==='a'?'aFallbackInput':'bFallbackInput');var hex=inp.value.trim().toLowerCase();if(!hex.startsWith('#'))hex='#'+hex;if(!/^#[0-9a-f]{6}$/i.test(hex)){alert('Enter a valid hex like #c4d702');return;}addColorEntry(img,hex);inp.value='';}
function addColorEntry(img,hex){var names=hexToNames(hex);colorLists[img].push({hex:hex,fancy:names.fancy,simple:names.simple,confidence:names.confidence,label:names.label,confColor:names.confColor});document.getElementById(img==='a'?'aPreview':'bPreview').style.background=hex;document.getElementById(img==='a'?'aHex':'bHex').textContent=hex;renderColorList(img);}
function renderColorList(img){var el=document.getElementById(img==='a'?'aColorList':'bColorList');el.innerHTML=colorLists[img].map(function(c){return'<div class="color-tag"><div class="color-swatch" style="background:'+c.hex+'"></div><span class="color-name-fancy">'+c.fancy+'</span>'+(c.simple?'<span class="color-name-simple">('+c.simple+')</span>':'')+'<span style="color:var(--text3);font-size:11px;font-family:monospace">'+c.hex+'</span><span style="font-size:10px;font-weight:700;color:'+c.confColor+';background:'+c.confColor+'18;border:1px solid '+c.confColor+'44;border-radius:4px;padding:1px 6px;">'+c.label+' '+c.confidence+'%</span></div>';}).join('');}

var rowCount=0;
function autoResize(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}

function addRow(){
  rowCount++;var id=rowCount;
  var tr=document.createElement('tr');tr.id='row'+id;
  tr.innerHTML=
    '<td style="vertical-align:middle;"><textarea class="notes-input" rows="1" placeholder="Enter request..." oninput="autoResize(this);updateSummary()"></textarea></td>'
    +'<td>'
    +'<div class="cb-group"><label><input type="radio" name="a'+id+'" value="yes" onchange="updateSummary()"/> Yes</label><label><input type="radio" name="a'+id+'" value="partial" onchange="updateSummary()"/> Partial</label><label><input type="radio" name="a'+id+'" value="no" onchange="updateSummary()"/> No</label></div>'
    +'<div class="sub-notes"><div class="sub-note-wrap"><div class="sub-note-label">Image A Notes</div>'
    +'<textarea class="sub-note-input" placeholder="Findings for Image A..." oninput="updateSummary()"></textarea>'
    +'<div class="note-actions"><button class="note-save-btn btn-general" onclick="saveNote('+id+',\'a\')">Save Note</button><button class="note-save-btn btn-ai" onclick="saveAiNote('+id+',\'a\')">Save AI Issue</button></div>'
    +'</div></div>'
    +'</td>'
    +'<td>'
    +'<div class="cb-group"><label><input type="radio" name="b'+id+'" value="yes" onchange="updateSummary()"/> Yes</label><label><input type="radio" name="b'+id+'" value="partial" onchange="updateSummary()"/> Partial</label><label><input type="radio" name="b'+id+'" value="no" onchange="updateSummary()"/> No</label></div>'
    +'<div class="sub-notes"><div class="sub-note-wrap"><div class="sub-note-label">Image B Notes</div>'
    +'<textarea class="sub-note-input" placeholder="Findings for Image B..." oninput="updateSummary()"></textarea>'
    +'<div class="note-actions"><button class="note-save-btn btn-general" onclick="saveNote('+id+',\'b\')">Save Note</button><button class="note-save-btn btn-ai" onclick="saveAiNote('+id+',\'b\')">Save AI Issue</button></div>'
    +'</div></div>'
    +'</td>';
  document.getElementById('rows').appendChild(tr);updateSummary();
}

function getRows(){return Array.from(document.querySelectorAll('#rows tr')).map(function(tr){var reqTA=tr.querySelector('textarea.notes-input');var tas=tr.querySelectorAll('textarea.sub-note-input');var aY=tr.querySelector('input[value=yes][name^=a]');var aP=tr.querySelector('input[value=partial][name^=a]');var aN=tr.querySelector('input[value=no][name^=a]');var bY=tr.querySelector('input[value=yes][name^=b]');var bP=tr.querySelector('input[value=partial][name^=b]');var bN=tr.querySelector('input[value=no][name^=b]');return{note:reqTA?reqTA.value.trim():'',a:aY&&aY.checked?'yes':aP&&aP.checked?'partial':aN&&aN.checked?'no':'',b:bY&&bY.checked?'yes':bP&&bP.checked?'partial':bN&&bN.checked?'no':'',aNotes:tas[0]?tas[0].value.trim():'',bNotes:tas[1]?tas[1].value.trim():''};});}
function renderList(items){if(!items.length)return'<div class="empty">None</div>';return items.map(function(item){return'<div class="sum-item"><div class="sum-item-title"><span class="'+item.dc+'">'+item.sym+'</span>'+item.title+'</div>'+(item.sub?'<div class="sum-item-subnote">'+item.sub+'</div>':'')+'</div>';}).join('');}
function updateSummary(){var rows=getRows();function mk(f,img,dc,sym){return rows.filter(function(r){return r[img]===f&&r.note;}).map(function(r){return{title:r.note,sub:r[img+'Notes'],dc:dc,sym:sym};});}document.getElementById('aNot').innerHTML=renderList(mk('no','a','dot-no','●'));document.getElementById('aPartial').innerHTML=renderList(mk('partial','a','dot-partial','◑'));document.getElementById('aHas').innerHTML=renderList(mk('yes','a','dot-yes','●'));document.getElementById('bNot').innerHTML=renderList(mk('no','b','dot-no','●'));document.getElementById('bPartial').innerHTML=renderList(mk('partial','b','dot-partial','◑'));document.getElementById('bHas').innerHTML=renderList(mk('yes','b','dot-yes','●'));}

function resetAll(){
  colorLists.a=[];colorLists.b=[];aiNotes.a=[];aiNotes.b=[];
  ['a','b'].forEach(function(img){document.getElementById(img==='a'?'aColorList':'bColorList').innerHTML='';document.getElementById(img==='a'?'aPreview':'bPreview').style.background='var(--surface2)';document.getElementById(img==='a'?'aHex':'bHex').textContent='';document.getElementById(img+'AiNotes').innerHTML='';document.getElementById(img+'AiSection').style.display='none';});
  rowCount=0;document.getElementById('rows').innerHTML='';
  for(var i=0;i<5;i++)addRow();
}

for(var i=0;i<5;i++)addRow();
